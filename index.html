<!DOCTYPE html>
<html>
<head>
    <title>Wordle League (Staging)</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="styles.css">
    <style>
        .league-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .league-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            background-color: #f9f9f9;
        }
        .league-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .league-button {
            margin-top: 10px;
            padding: 8px 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .status-active {
            color: green;
        }
        .status-error {
            color: red;
        }
    </style>
</head>
<body>
    <h1>Wordle League (Staging Environment)</h1>
    <div id="content">
        <p>This is the staging environment for the Wordle League website.</p>
        <p>Current date: 2025-08-04</p>
        
        <div class="league-grid">
            <div class="league-card">
                <div class="league-name">Wordle Warriorz</div>
                <div class="league-status status-active">Active</div>
                <form action="/wordle-league-staging/warriorz/" method="get">
                    <button type="submit" class="league-button">View League</button>
                </form>
            </div>
            <div class="league-card">
                <div class="league-name">Wordle Gang</div>
                <div class="league-status status-active">Active</div>
                <form action="/wordle-league-staging/gang/" method="get">
                    <button type="submit" class="league-button">View League</button>
                </form>
            </div>
            <div class="league-card">
                <div class="league-name">Wordle PAL</div>
                <div class="league-status status-active">Active</div>
                <form action="/wordle-league-staging/pal/" method="get">
                    <button type="submit" class="league-button">View League</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
